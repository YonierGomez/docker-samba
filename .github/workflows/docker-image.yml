name: Docker Image CI for Samba (multi-arch)

on:
  schedule:
    - cron: '0 8 * * 1' # Cada lunes a las 8:00 UTC
  workflow_dispatch:

jobs:
  check_and_build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Download codigo from repo

    - name: Get latest Samba version from Alpine
      id: samba_version
      run: |
        SAMBA_VERSION=$(docker run --rm alpine:latest sh -c \
          "apk update > /dev/null 2>&1 && apk info samba 2>/dev/null | head -1 | sed 's/samba-//'")
        echo "version=$SAMBA_VERSION" >> "$GITHUB_OUTPUT"
        echo "Samba version in Alpine: $SAMBA_VERSION"

    - name: Get latest release tag from repo
      id: latest_release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
        echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
        echo "Latest release tag: $LATEST_TAG"

    - name: Compare versions
      id: compare
      run: |
        SAMBA="v${{ steps.samba_version.outputs.version }}"
        LATEST="${{ steps.latest_release.outputs.tag }}"
        echo "Samba: $SAMBA vs Latest release: $LATEST"
        if [ "$SAMBA" != "$LATEST" ]; then
          echo "new_version=true" >> "$GITHUB_OUTPUT"
          echo "Nueva version detectada"
        else
          echo "new_version=false" >> "$GITHUB_OUTPUT"
          echo "Sin cambios"
        fi

    - name: Set up QEMU
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.USER_HUB }}
        password: ${{ secrets.PASS_HUB }}

    - name: Build and push Docker image
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: true
        tags: |
          neytor/samba:latest
          neytor/samba:${{ steps.samba_version.outputs.version }}

    - name: Create GitHub Release
      if: steps.compare.outputs.new_version == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ steps.samba_version.outputs.version }}"
        gh release create "$TAG" \
          --title "Samba ${{ steps.samba_version.outputs.version }}" \
          --notes "Automated release for Samba ${{ steps.samba_version.outputs.version }} on Alpine.

        Docker tags:
        - \`neytor/samba:latest\`
        - \`neytor/samba:${{ steps.samba_version.outputs.version }}\`

        Platforms: linux/amd64, linux/arm64, linux/arm/v7"
