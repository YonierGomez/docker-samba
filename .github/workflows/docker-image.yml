name: Docker Image CI for Samba (multi-arch)

on:
  schedule:
    - cron: '0 8 * * 1' # Cada lunes a las 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_and_build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Download codigo from repo

    - name: Get latest Samba version from Alpine
      id: samba_version
      run: |
        SAMBA_VERSION=$(docker run --rm alpine:latest sh -c \
          "apk update > /dev/null 2>&1 && apk list samba 2>/dev/null | grep '^samba-' | head -1 | sed 's/samba-\([^ ]*\).*/\1/'")
        echo "version=$SAMBA_VERSION" >> "$GITHUB_OUTPUT"
        echo "Samba version in Alpine: $SAMBA_VERSION"

    - name: Get latest release tag from repo
      id: latest_release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
        echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
        echo "Latest release tag: $LATEST_TAG"

    - name: Compare versions
      id: compare
      run: |
        SAMBA="v${{ steps.samba_version.outputs.version }}"
        LATEST="${{ steps.latest_release.outputs.tag }}"
        echo "Samba: $SAMBA vs Latest release: $LATEST"
        if [ "$SAMBA" != "$LATEST" ]; then
          echo "new_version=true" >> "$GITHUB_OUTPUT"
          echo "Nueva version detectada"
        else
          echo "new_version=false" >> "$GITHUB_OUTPUT"
          echo "Sin cambios"
        fi

    - name: Set up QEMU
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.USER_HUB }}
        password: ${{ secrets.PASS_HUB }}

    - name: Build and push Docker image
      if: steps.compare.outputs.new_version == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: true
        tags: |
          neytor/samba:latest
          neytor/samba:${{ steps.samba_version.outputs.version }}

    - name: Get Samba release notes
      if: steps.compare.outputs.new_version == 'true'
      id: changelog
      run: |
        VERSION="${{ steps.samba_version.outputs.version }}"
        # Extraer version base sin -rN de Alpine (4.22.8-r0 -> 4.22.8)
        SAMBA_BASE=$(echo "$VERSION" | sed 's/-r[0-9]*//')
        URL="https://www.samba.org/samba/history/samba-${SAMBA_BASE}.html"
        echo "Fetching release notes from: $URL"

        NOTES=$(curl -sf "$URL" 2>/dev/null | \
          sed -n '/Changes since/,/<\/pre>/p' | \
          sed 's/<[^>]*>//g' | \
          sed '/^$/d' | \
          head -60 || echo "No se encontraron notas para esta versión.")

        # Guardar en archivo para evitar problemas con caracteres especiales
        echo "$NOTES" > /tmp/samba_changelog.txt
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "base_version=$SAMBA_BASE" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release
      if: steps.compare.outputs.new_version == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ steps.samba_version.outputs.version }}"
        VERSION="${{ steps.samba_version.outputs.version }}"
        CHANGELOG=$(cat /tmp/samba_changelog.txt)
        NOTES_URL="${{ steps.changelog.outputs.url }}"

        cat > /tmp/release_notes.md << EOF
        ## Samba ${VERSION} on Alpine Linux

        ### Novedades de Samba ${{ steps.changelog.outputs.base_version }}

        \`\`\`
        ${CHANGELOG}
        \`\`\`

        > 📋 [Release notes completas](${NOTES_URL})

        ### Docker tags
        \`\`\`bash
        docker pull neytor/samba:latest
        docker pull neytor/samba:${VERSION}
        \`\`\`

        ### Arquitecturas soportadas
        La imagen es multi-arch. Docker descarga la versión correcta automáticamente.

        | Arquitectura | Plataforma | Comando para forzar |
        |---|---|---|
        | x86-64 | PCs, servidores | \`docker pull --platform linux/amd64 neytor/samba\` |
        | ARM64 | Raspberry Pi 3/4/5, Apple Silicon | \`docker pull --platform linux/arm64 neytor/samba\` |
        | ARMv7 | Raspberry Pi 2, IoT | \`docker pull --platform linux/arm/v7 neytor/samba\` |

        ### Uso rápido
        \`\`\`bash
        docker run -d --name samba -p 445:445 -v samba:/download neytor/samba
        \`\`\`
        Accede via \`smb://tu-ip\` con usuario \`neytor\` / contraseña \`neytor\`
        EOF

        gh release create "$TAG" \
          --title "Samba $VERSION" \
          --notes-file /tmp/release_notes.md
